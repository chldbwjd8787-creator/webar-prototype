<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Memory AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 9999;
      padding: 12px 14px;
      border-radius: 14px;
      color: #111;
      background: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
    }

    #status {
      font-weight: 850;
      margin-bottom: 4px;
    }

    #shutterBtn {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      z-index: 9999;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      display: none;
      padding: 0;
    }

    #shutterBtn::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 50%;
      background: #ffffff;
    }

    #shutterBtn:active {
      transform: translateX(-50%) scale(0.92);
    }

    #flash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    #savePanel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 24px;
      z-index: 10001;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.96);
      color: #111;
      box-shadow: 0 12px 42px rgba(0,0,0,0.25);
      backdrop-filter: blur(14px);
      display: none;
      text-align: center;
    }

    #savePanelTitle {
      font-size: 17px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    #savePanelText {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 14px;
    }

    .panelBtn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 999px;
      border: 0;
      font-size: 15px;
      font-weight: 850;
      text-decoration: none;
      margin-top: 8px;
    }

    #downloadBtn {
      background: #111;
      color: #fff;
    }

    #openBtn {
      background: #eeeeee;
      color: #111;
    }

    #closeBtn {
      background: transparent;
      color: #777;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1 !important;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="status">전시 사진을 비춰주세요.</div>
    <div id="sub">사진이 인식되면 이미지가 서서히 나타납니다.</div>
  </div>

  <button id="shutterBtn" aria-label="기억 촬영하기"></button>
  <div id="flash"></div>

  <div id="savePanel">
    <div id="savePanelTitle">기억이 복원되었습니다.</div>
    <div id="savePanelText">
      재구성된 이미지를 저장할 수 있습니다.<br>
      iPhone에서는 이미지 열기 후 공유 버튼으로 사진 앱에 저장하세요.
    </div>

    <a id="downloadBtn" class="panelBtn" href="./assets/ai.jpg" download="memory-reconstruction.jpg">기억 저장하기</a>
    <a id="openBtn" class="panelBtn" href="./assets/ai.jpg" target="_blank">이미지 열기</a>
    <button id="closeBtn" class="panelBtn">닫기</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");

    const shutterBtn = document.getElementById("shutterBtn");
    const flash = document.getElementById("flash");
    const savePanel = document.getElementById("savePanel");
    const closeBtn = document.getElementById("closeBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    const FADE_DURATION = 4000;

    let animationFrame = null;
    let startTime = null;
    let isImageReady = false;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", value);
    }

    function stopFade() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      startTime = null;
      setOpacity(0);
    }

    function hideAllActionUI() {
      isImageReady = false;
      shutterBtn.style.display = "none";
      savePanel.style.display = "none";
    }

    function showShutter() {
      isImageReady = true;
      shutterBtn.style.display = "block";
      savePanel.style.display = "none";
      subEl.textContent = "셔터 버튼을 눌러 기억을 복원할 수 있습니다.";
    }

    function startFade() {
      stopFade();
      hideAllActionUI();

      startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / FADE_DURATION, 1);

        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        setOpacity(eased);

        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        } else {
          showShutter();
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    function cameraFlash() {
      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 140);
    }

    target.addEventListener("targetFound", () => {
      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "이미지가 서서히 나타납니다.";
      startFade();
    });

    target.addEventListener("targetLost", () => {
      statusEl.textContent = "전시 사진을 다시 비춰주세요.";
      subEl.textContent = "인식이 끊어졌습니다.";
      hideAllActionUI();
      stopFade();
    });

    shutterBtn.addEventListener("click", () => {
      if (!isImageReady) return;

      cameraFlash();

      shutterBtn.style.display = "none";

      setTimeout(() => {
        statusEl.textContent = "기억이 복원되었습니다.";
        subEl.textContent = "재구성된 이미지를 저장할 수 있습니다.";
        savePanel.style.display = "block";
      }, 180);
    });

    downloadBtn.addEventListener("click", () => {
      downloadBtn.textContent = "기억이 저장되었습니다.";
      setTimeout(() => {
        downloadBtn.textContent = "기억 저장하기";
      }, 2500);
    });

    closeBtn.addEventListener("click", () => {
      savePanel.style.display = "none";
      if (isImageReady) shutterBtn.style.display = "block";
    });
  </script>
</body>
</html>
