<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebAR Prototype A</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    #startBtn {
      margin-top: 20px;
      padding: 14px 20px;
      border: 0;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      background: white;
      color: black;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 9999;
      padding: 12px 14px;
      border-radius: 14px;
      color: white;
      background: rgba(0,0,0,0.55);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
    }

    #status {
      font-weight: 700;
      margin-bottom: 4px;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -2 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      z-index: 1 !important;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>
  <div id="startScreen">
    <h2>WebAR Prototype</h2>
    <p>버튼을 누른 뒤 카메라를 허용하고<br>전시 사진을 비춰주세요.</p>
    <button id="startBtn">AR 시작</button>
  </div>

  <div id="ui">
    <div id="status">대기 중</div>
    <div id="sub">AR 시작 버튼을 눌러주세요.</div>
  </div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: false; uiScanning: yes; uiLoading: yes; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const sceneEl = document.getElementById("scene");

    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");

    const FADE_DURATION = 4000;
    let animationFrame = null;
    let startTime = null;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", value);
    }

    function stopFade() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      startTime = null;
      setOpacity(0);
    }

    function startFade() {
      stopFade();
      startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / FADE_DURATION, 1);
        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        setOpacity(eased);

        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    startBtn.addEventListener("click", async () => {
      try {
        statusEl.textContent = "AR 시작 중...";
        subEl.textContent = "카메라 권한을 허용해주세요.";

        const mindarSystem = sceneEl.systems["mindar-image-system"];

        await mindarSystem.start();

        startScreen.style.display = "none";
        statusEl.textContent = "카메라 실행 중";
        subEl.textContent = "전시 사진을 비춰주세요.";
      } catch (err) {
        statusEl.textContent = "AR 시작 실패";
        subEl.textContent = err.name + " / " + err.message;
        console.error(err);
      }
    });

    target.addEventListener("targetFound", () => {
      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "AI 이미지가 서서히 나타납니다.";
      startFade();
    });

    target.addEventListener("targetLost", () => {
      statusEl.textContent = "사진을 다시 비춰주세요.";
      subEl.textContent = "인식이 끊어졌습니다.";
      stopFade();
    });
  </script>
</body>
</html>
