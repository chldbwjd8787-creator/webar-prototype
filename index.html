<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camera Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>

  <div id="ui">
    <div id="status">카메라 테스트</div>
    <button id="startBtn">카메라 시작</button>
  </div>

  <script>
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    async function startCamera() {
      try {
        statusEl.textContent = "카메라 요청 중...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        statusEl.textContent = "카메라 실행 성공";
      } catch (err) {
        statusEl.textContent = "카메라 실패: " + err.name + " / " + err.message;
        console.error(err);
      }
    }

    startBtn.addEventListener("click", startCamera);
  </script>
</body>
</html>
